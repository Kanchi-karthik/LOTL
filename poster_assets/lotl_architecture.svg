<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1700" viewBox="0 0 1200 1700" role="img" aria-label="LOTLGuard architecture diagram portrait">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081b2d"/>
      <stop offset="100%" stop-color="#123b5f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fcff"/>
      <stop offset="100%" stop-color="#d9f1ff"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ae8ff"/>
      <stop offset="100%" stop-color="#4fc7ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#00101f" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#71d8ff"/>
    </marker>
  </defs>

  <rect width="1200" height="1700" fill="url(#bg)"/>
  <circle cx="140" cy="180" r="220" fill="#2b6ca0" opacity="0.15"/>
  <circle cx="1060" cy="1520" r="260" fill="#2b6ca0" opacity="0.15"/>

  <text x="600" y="80" fill="#ffffff" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">LOTLGuard Architecture Diagram</text>
  <text x="600" y="122" fill="#c8ecff" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24">Telemetry Ingestion -> Feature Engineering -> ML Detection -> Response -> SOC Dashboard</text>

  <g filter="url(#softShadow)">
    <rect x="120" y="180" width="960" height="140" rx="20" fill="url(#card)"/>
    <rect x="120" y="390" width="960" height="140" rx="20" fill="url(#card)"/>
    <rect x="120" y="600" width="960" height="140" rx="20" fill="url(#card)"/>
    <rect x="120" y="810" width="960" height="140" rx="20" fill="url(#core)"/>
    <rect x="120" y="1020" width="960" height="140" rx="20" fill="url(#card)"/>
    <rect x="120" y="1230" width="960" height="140" rx="20" fill="url(#card)"/>
    <rect x="120" y="1440" width="960" height="140" rx="20" fill="url(#card)"/>
  </g>

  <g fill="#0e2f49" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="236" font-size="34" font-weight="700">1. Simulation and Event Generation</text>
    <text x="600" y="274" font-size="24">shared_kernel_app.py + inject_command.py + logs/falco_events.log</text>

    <text x="600" y="446" font-size="34" font-weight="700">2. Parsing and Normalization</text>
    <text x="600" y="484" font-size="24">parser/falco_parser.py converts raw events into structured telemetry</text>

    <text x="600" y="656" font-size="34" font-weight="700">3. Feature Engineering</text>
    <text x="600" y="694" font-size="24">feature_builder.py extracts entropy, dangerous tools, and path/network indicators</text>

    <text x="600" y="866" font-size="34" font-weight="700">4. ML Anomaly Detection Core</text>
    <text x="600" y="904" font-size="24">realtime_detector.py with Isolation Forest + confidence scoring</text>

    <text x="600" y="1076" font-size="34" font-weight="700">5. Threat Scoring and MITRE Mapping</text>
    <text x="600" y="1114" font-size="24">threat_scoring.py + mitre_mapper.py produce score and ATTACK technique labels</text>

    <text x="600" y="1286" font-size="34" font-weight="700">6. Automated Response and Quarantine</text>
    <text x="600" y="1324" font-size="24">incident_response.py + quarantine_manager.py trigger containment and forensics</text>

    <text x="600" y="1496" font-size="34" font-weight="700">7. SOC Visualization Layer</text>
    <text x="600" y="1534" font-size="24">dashboard/app.py renders incidents, topology, analytics, and operator workflow</text>
  </g>

  <g stroke="#71d8ff" stroke-width="7" fill="none" marker-end="url(#arrow)">
    <path d="M600 320 L600 382"/>
    <path d="M600 530 L600 592"/>
    <path d="M600 740 L600 802"/>
    <path d="M600 950 L600 1012"/>
    <path d="M600 1160 L600 1222"/>
    <path d="M600 1370 L600 1432"/>
  </g>

  <rect x="120" y="1615" width="960" height="52" rx="12" fill="#0d2a43" opacity="0.75"/>
  <text x="600" y="1648" fill="#cbf0ff" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22">Designed for presentation readability in portrait poster format</text>
</svg>
