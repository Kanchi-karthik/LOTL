<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="LOTLGuard architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091a2b"/>
      <stop offset="60%" stop-color="#0d2740"/>
      <stop offset="100%" stop-color="#113859"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#d6eef9"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7de5ff"/>
      <stop offset="100%" stop-color="#42b6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#001" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#44b8ff"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="180" fill="#1f4d74" opacity="0.25"/>
  <circle cx="1480" cy="880" r="240" fill="#1f4d74" opacity="0.2"/>

  <text x="800" y="68" fill="#ffffff" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">LOTLGuard Secure Detection Architecture</text>
  <text x="800" y="104" fill="#bde8ff" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22">End-to-End Flow: Command Telemetry -> ML Detection -> Threat Scoring -> Automated Response</text>

  <g filter="url(#shadow)">
    <rect x="88" y="164" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="438" y="164" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="788" y="164" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="1138" y="164" width="374" height="146" rx="16" fill="url(#panel)"/>

    <rect x="188" y="404" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="538" y="404" width="300" height="146" rx="16" fill="url(#core)"/>
    <rect x="888" y="404" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="1238" y="404" width="274" height="146" rx="16" fill="url(#panel)"/>

    <rect x="330" y="646" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="680" y="646" width="300" height="146" rx="16" fill="url(#panel)"/>
    <rect x="1030" y="646" width="300" height="146" rx="16" fill="url(#panel)"/>
  </g>

  <g fill="#0f2a3c" font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <text x="238" y="216" font-size="24" font-weight="700">Shared Kernel UI</text>
    <text x="238" y="246" font-size="19">attack_simulation/shared_kernel_app.py</text>
    <text x="238" y="276" font-size="18">Manual and scripted LOTL commands</text>

    <text x="588" y="216" font-size="24" font-weight="700">Command Injector</text>
    <text x="588" y="246" font-size="19">attack_simulation/inject_command.py</text>
    <text x="588" y="276" font-size="18">Writes JSON events to runtime log</text>

    <text x="938" y="216" font-size="24" font-weight="700">Log Stream</text>
    <text x="938" y="246" font-size="19">logs/falco_events.log</text>
    <text x="938" y="276" font-size="18">Falco-compatible event telemetry</text>

    <text x="1325" y="216" font-size="24" font-weight="700">Parser and Normalizer</text>
    <text x="1325" y="246" font-size="19">parser/falco_parser.py</text>
    <text x="1325" y="276" font-size="18">Structured event extraction</text>

    <text x="338" y="456" font-size="24" font-weight="700">Feature Builder</text>
    <text x="338" y="486" font-size="19">feature_engineering/feature_builder.py</text>
    <text x="338" y="516" font-size="18">Entropy, tools, paths, network hints</text>

    <text x="688" y="456" font-size="24" font-weight="700">ML Anomaly Engine</text>
    <text x="688" y="486" font-size="19">detection/realtime_detector.py</text>
    <text x="688" y="516" font-size="18">Isolation Forest + confidence output</text>

    <text x="1038" y="456" font-size="24" font-weight="700">Threat Scoring Core</text>
    <text x="1038" y="486" font-size="19">backend/threat_scoring.py</text>
    <text x="1038" y="516" font-size="18">ML + heuristic + behavior weighting</text>

    <text x="1375" y="456" font-size="24" font-weight="700">MITRE Mapper</text>
    <text x="1375" y="486" font-size="19">mitre/mitre_mapper.py</text>
    <text x="1375" y="516" font-size="18">ATT&CK technique alignment</text>

    <text x="480" y="698" font-size="24" font-weight="700">Incident Response</text>
    <text x="480" y="728" font-size="19">response/incident_response.py</text>
    <text x="480" y="758" font-size="18">Severity-based orchestration</text>

    <text x="830" y="698" font-size="24" font-weight="700">Quarantine and Forensics</text>
    <text x="830" y="728" font-size="19">backend/quarantine_manager.py</text>
    <text x="830" y="758" font-size="18">Persistent isolation evidence logs</text>

    <text x="1180" y="698" font-size="24" font-weight="700">SOC Dashboard</text>
    <text x="1180" y="728" font-size="19">dashboard/app.py + JS analytics</text>
    <text x="1180" y="758" font-size="18">Live incidents, topology, geolocation</text>
  </g>

  <g stroke="#44b8ff" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M388 237 L438 237"/>
    <path d="M738 237 L788 237"/>
    <path d="M1088 237 L1138 237"/>

    <path d="M1330 310 L1330 378 L338 378 L338 404"/>
    <path d="M488 477 L538 477"/>
    <path d="M838 477 L888 477"/>
    <path d="M1188 477 L1238 477"/>

    <path d="M1375 550 L1375 610 L480 610 L480 646"/>
    <path d="M630 719 L680 719"/>
    <path d="M980 719 L1030 719"/>
  </g>

  <g fill="#d7f3ff" font-family="Segoe UI, Arial, sans-serif">
    <text x="118" y="930" font-size="18">Security posture: fast anomaly detection, explainable scoring, and automated containment.</text>
  </g>
</svg>
