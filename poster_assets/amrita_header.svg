<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="260" viewBox="0 0 1600 260" role="img" aria-label="Amrita banner and School of Computing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a6004f"/>
      <stop offset="100%" stop-color="#cc1367"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5cc"/>
      <stop offset="100%" stop-color="#f9eb9c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="260" fill="#0a0d17"/>
  <rect x="20" y="20" width="1560" height="220" rx="14" fill="url(#edge)"/>

