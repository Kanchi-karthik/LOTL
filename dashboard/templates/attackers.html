<!DOCTYPE html>

<html>

<head>

<title>Detected Attackers</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container">

<h1 class="mt-4">Detected Attackers</h1>

<table class="table table-dark">

<tr>
<th>Command</th>
<th>Count</th>
</tr>

{% for row in data %}

<tr>
<td>{{row.command}}</td>
<td>{{row.count}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>

</html>
