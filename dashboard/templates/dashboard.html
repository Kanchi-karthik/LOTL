<!DOCTYPE html>

<html>

<head>

<title>Runtime Security SOC</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/static/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/static/charts.js"></script>

</head>

<body>

<div class="container">

<h1 class="mt-4">Runtime Security SOC</h1>

<div class="row mt-4">

<div class="col">

<div class="card">

<h3>{{commands}}</h3>

Total Commands

</div>

</div>


<div class="col">

<div class="card">

<h3>{{anomalies}}</h3>

Detected Attacks

</div>

</div>


<div class="col">

<div class="card">

<h3>{{containers}}</h3>

Containers Monitored

</div>

</div>

</div>


<h2 class="mt-5">Attack Activity</h2>

<canvas id="commandChart"></canvas>


<h2 class="mt-5">Live Attack Stream</h2>

<table class="table table-dark">

<thead>

<tr>

<th>Command</th>
<th>Count</th>
<th>Severity</th>

</tr>

</thead>

<tbody id="events"></tbody>

</table>


<h2 class="mt-5">Cluster Topology</h2>

<canvas id="topology" width="500" height="250"></canvas>

<br><br>

<a href="/attackers" class="btn btn-danger">Attackers</a>

<a href="/containers" class="btn btn-primary">Applications</a>

<a href="/incidents" class="btn btn-warning">Incidents</a>

</div>

<script src="/static/live_events.js"></script>
<script src="/static/topology.js"></script>

</body>

</html>
